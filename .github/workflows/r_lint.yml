name: R-Lint-Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        run: |
          install.packages(c("remotes", "optparse", "data.table"))
          remotes::install_github("broadinstitute/ichorCNA")
        shell: Rscript {0}

      - name: Check script syntax
        run: Rscript -e "parse('scripts/runIchorCNA.R')"
